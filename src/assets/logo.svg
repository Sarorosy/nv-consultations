<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 130" width="340" height="130" role="img" aria-label="Dr. Navin's Diabetes Care Logo">
  <defs>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1BBDE8"/>
      <stop offset="100%" style="stop-color:#0A9FC8"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E63B2A"/>
      <stop offset="100%" style="stop-color:#C82E1E"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#1BBDE8" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- ══ CIRCULAR BADGE ══ -->
  <circle cx="63" cy="65" r="55" fill="white" stroke="url(#cyanGrad)" stroke-width="6" filter="url(#shadow)"/>

  <!-- ── D shape: arc + top/bottom bars ── -->
  <path d="M 52 30 C 16 30 16 100 52 100"
    fill="none" stroke="url(#cyanGrad)" stroke-width="11" stroke-linecap="round"/>
  <line x1="52" y1="30" x2="72" y2="30" stroke="url(#cyanGrad)" stroke-width="11" stroke-linecap="round"/>
  <line x1="52" y1="100" x2="72" y2="100" stroke="url(#cyanGrad)" stroke-width="11" stroke-linecap="round"/>

  <!-- ── N shape overlapping D ── -->
  <line x1="65" y1="30" x2="65" y2="100" stroke="url(#cyanGrad)" stroke-width="10" stroke-linecap="round"/>
  <line x1="91" y1="30" x2="91" y2="100" stroke="url(#cyanGrad)" stroke-width="10" stroke-linecap="round"/>
  <line x1="65" y1="30" x2="91" y2="100" stroke="url(#cyanGrad)" stroke-width="8" stroke-linecap="round"/>

  <!-- ══ TEXT BLOCK ══ -->

  <!-- "Dr.Navin's" bold italic red -->
  <text
    x="136" y="68"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="33" font-weight="700" font-style="italic"
    fill="url(#redGrad)" letter-spacing="0.3"
  >Dr.Navin's</text>

  <!-- Separator line -->
  <rect x="136" y="74" width="185" height="1.5" rx="0.75" fill="#1BBDE8" opacity="0.3"/>

  <!-- "DIABETES CARE" cyan uppercase -->
  <text
    x="138" y="97"
    font-family="'Arial Black', Arial, Helvetica, sans-serif"
    font-size="17" font-weight="900"
    fill="url(#cyanGrad)" letter-spacing="3.2"
  >DIABETES CARE</text>
</svg>